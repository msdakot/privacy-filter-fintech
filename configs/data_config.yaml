gretel:
  hf_path: gretelai/synthetic_pii_finance_multilingual
  text_col: generated_text
  spans_col: pii_spans
  spans_format: json_string  # must json.loads() before use

nemotron:
  hf_path: nvidia/Nemotron-PII
  text_col: text
  spans_col: spans
  spans_format: list  # already parsed
  filter_domains:
    - Finance
    - Identity Verification Services
    - Real Estate
    - Insurance
    - Ecommerce
    - Retail
    - Identity Management

synthetic:
  output_dir: data/synthetic
  n_examples: 400
  labels:
    - lei
    - isin
    - cusip
    - bban
    - iban
    - vat_number

output:
  hf_repo: msdakot/fintech-privacy-pii
  processed_dir: data/processed
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
