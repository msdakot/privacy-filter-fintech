model:
  base: OpenMed/privacy-filter-nemotron  # config.json patched in Colab to add opf-required fields (encoding, bidirectional_context)

training:
  learning_rate: 1.0e-4
  epochs: 3
  batch_size: 2
  grad_accumulation_steps: 4
  dtype: bf16
  weight_decay: 0.0

dataset:
  hf_path: msdakot/fintech-privacy-pii

output:
  hf_repo: msdakot/fintech-privacy-filter-v0
  checkpoint_dir: /content/drive/MyDrive/fintech-pii-checkpoints  # Colab Drive path
